<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clínica de Olhos Adi Nascimento</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <!-- 🔝 Cabeçalho -->
    <header>
      <img src="Ioan.png" alt="Logo da Clínica" class="logo" />
      <div>
        <h1>Clínica de Olhos Adi Nascimento</h1>
        <h2>Gestão de Exames - TSH e Curva Tensional</h2>
      </div>
    </header>

    <!-- 🗂️ Abas -->
    <div class="tabs">
      <button onclick="showTab('exames-dia')" class="tab-btn active">Exames do Dia</button>
      
    </div>

    <!-- 🔷 Aba Exames do Dia -->
    <div id="exames-dia" class="tab-content">
      <!-- 📋 Formulário -->
      <form id="patient-form">
        <input type="text" id="name" placeholder="Nome do Paciente" required />
        <input type="date" id="dob" required />
        <select id="operator" required>
          <option value="">Operador</option>
          <option value="Anderson">Anderson</option>
          <option value="Victor">Victor</option>
        </select>
        <select id="exam-type" required>
          <option value="">Tipo de Exame</option>
          <option value="tsh">TSH</option>
          <option value="curva">Curva Tensional</option>
        </select>
        <textarea id="observation" placeholder="Observações (opcional)" rows="3"></textarea>
        <button type="submit">Adicionar Paciente</button>
      </form>

      <!-- 🏥 Pacientes Ativos -->
      <div id="patients-list"></div>

      <!-- 📜 Histórico do Dia e Botão do Histórico Antigo -->
      <h3>
        Histórico de Pacientes do Dia
        <button onclick="toggleHistory()" class="toggle-btn" title="Mostrar/ocultar lista">▼</button>
        <button onclick="showTab('historico-antigo')" class="toggle-btn" title="Ver Histórico Antigo">📅</button>
      </h3>

      <div class="buttons">
        <button onclick="printHistory()" class="print-btn" title="Imprimir Histórico do Dia">🖨️</button>
        <button onclick="exportToCSV('history')" class="print-btn" title="Exportar Histórico do Dia">📥</button>
        <button onclick="clearHistory('day')" class="print-btn danger" title="Limpar Histórico do Dia">🗑️</button>
      </div>

      <div id="history" class="collapsible"></div>
    </div>

    <!-- 🔸 Aba Histórico Antigo -->
    <div id="historico-antigo" class="tab-content" style="display: none;">
      <h3>Histórico de Pacientes de Outras Datas</h3>
      <div class="buttons">
        <button onclick="printOldHistory()" class="print-btn" title="Imprimir Histórico Antigo">🖨️</button>
        <button onclick="exportToCSV('old-history')" class="print-btn" title="Exportar Histórico Antigo">📥</button>
        <button onclick="clearHistory('all')" class="print-btn danger" title="Limpar Todo Histórico">🗑️</button>
      </div>
     
<input type="text" id="old-history-search" placeholder="🔍 Buscar por nome...">
<div id="old-history" class="tab-content"></div>

      <div id="old-history"></div>
    </div>
  </div>

  <footer class="custom-footer">
  Made by Anderson Moura – Instituto de Olhos
</footer>

  <!-- 🔔 Mensagem Temporária -->
  <div id="message" class="message"></div>

  <!-- 🔊 Alerta de Som -->
  <audio id="alertSound">
    <source src="alert.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
